name: Static Site to GitHub Pages

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version for npm build"
        required: false
        default: "24"
        type: string
      build-command:
        description: "Build command"
        required: false
        default: "npm run build"
        type: string
      output-directory:
        description: "Build output directory"
        required: false
        default: "dist"
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      pre-build-command:
        description: "Optional shell command before npm ci (e.g. cluster-status sync)"
        required: false
        default: ""
        type: string
    outputs:
      page_url:
        description: "Deployed page URL"
        value: ${{ jobs.deploy.outputs.page_url }}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Pre-build (optional)
        if: inputs.pre-build-command != ''
        run: ${{ inputs.pre-build-command }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ inputs.build-command }}
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ inputs.working-directory }}/${{ inputs.output-directory }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Summary
        run: |
          echo "## GitHub Pages Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
