name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        default: "3.11"
        type: string
      working-directory:
        description: "Working directory for commands"
        required: false
        default: "."
        type: string
      package-manager:
        description: "Package manager: poetry or pip"
        required: false
        default: "poetry"
        type: string
      run-ruff:
        description: "Run ruff linter"
        required: false
        default: true
        type: boolean
      run-mypy:
        description: "Run mypy type checker"
        required: false
        default: true
        type: boolean
      run-pytest:
        description: "Run pytest tests"
        required: false
        default: true
        type: boolean
      mypy-paths:
        description: "Paths for mypy to check (space-separated)"
        required: false
        default: "src/"
        type: string
      pytest-args:
        description: "Additional pytest arguments"
        required: false
        default: ""
        type: string
      poetry-groups:
        description: "Poetry groups to exclude (e.g., --without capture)"
        required: false
        default: ""
        type: string
      runs-on:
        description: "Runner labels (string or JSON array). Default self-hosted (Eldertree ARC)."
        required: false
        default: "self-hosted"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ${{ startsWith(inputs['runs-on'], '[') && fromJSON(inputs['runs-on']) || inputs['runs-on'] }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Poetry
        if: inputs.package-manager == 'poetry'
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure Poetry
        if: inputs.package-manager == 'poetry'
        run: poetry config virtualenvs.create true --local

      - name: Cache Poetry dependencies
        if: inputs.package-manager == 'poetry'
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/.venv
          key: ${{ runner.os }}-poetry-${{ inputs.python-version }}-${{ hashFiles(format('{0}/poetry.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ inputs.python-version }}-

      - name: Install dependencies (Poetry)
        if: inputs.package-manager == 'poetry'
        run: poetry install --no-interaction ${{ inputs.poetry-groups }}

      - name: Cache pip dependencies
        if: inputs.package-manager == 'pip'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles(format('{0}/requirements*.txt', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-

      - name: Install dependencies (pip)
        if: inputs.package-manager == 'pip'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip install ruff mypy pytest
          fi

      - name: Run Ruff
        if: inputs.run-ruff
        run: |
          if [ "${{ inputs.package-manager }}" = "poetry" ]; then
            poetry run ruff check .
          else
            ruff check .
          fi

      - name: Run Mypy
        if: inputs.run-mypy
        run: |
          if [ "${{ inputs.package-manager }}" = "poetry" ]; then
            poetry run mypy ${{ inputs.mypy-paths }}
          else
            mypy ${{ inputs.mypy-paths }}
          fi

      - name: Run Pytest
        if: inputs.run-pytest
        run: |
          if [ "${{ inputs.package-manager }}" = "poetry" ]; then
            poetry run pytest ${{ inputs.pytest-args }}
          else
            pytest ${{ inputs.pytest-args }}
          fi

      - name: Summary
        run: |
          {
            echo "## Python CI Summary"
            echo ""
            echo "**Python:** ${{ inputs.python-version }}"
            echo "**Package Manager:** ${{ inputs.package-manager }}"
            echo "**Working Directory:** ${{ inputs.working-directory }}"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Ruff | ${{ inputs.run-ruff && '✅ Passed' || '⏭️ Skipped' }} |"
            echo "| Mypy | ${{ inputs.run-mypy && '✅ Passed' || '⏭️ Skipped' }} |"
            echo "| Pytest | ${{ inputs.run-pytest && '✅ Passed' || '⏭️ Skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
