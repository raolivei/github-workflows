name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name without registry prefix (e.g., my-app)"
        required: true
        type: string
      context:
        description: "Docker build context"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/arm64"
        type: string
      registry:
        description: "Container registry"
        required: false
        default: "ghcr.io"
        type: string
      push:
        description: "Push image after build"
        required: false
        default: true
        type: boolean
      build-args:
        description: "Docker build arguments (multiline KEY=value)"
        required: false
        default: ""
        type: string
    secrets:
      REGISTRY_TOKEN:
        description: "Registry authentication token"
        required: true
    outputs:
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest }}
      version:
        description: "Version extracted from VERSION file"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
            SOURCE="VERSION"
          elif [ -f "${{ inputs.context }}/VERSION" ]; then
            VERSION=$(cat "${{ inputs.context }}/VERSION" | tr -d '[:space:]')
            SOURCE="${{ inputs.context }}/VERSION"
          else
            VERSION="0.1.0"
            SOURCE="default"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: v$VERSION (from $SOURCE)"

      - name: Announce build version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          # `::notice::` creates an entry in the workflow-run Annotations
          # panel so the version is discoverable without drilling into
          # step logs (matches how PR reviewers scan the run summary).
          echo "::notice title=Build version::${IMAGE}:v${VERSION}"

      - name: Log in to registry
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=semver,pattern=v{{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern=v{{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern=v{{major}},value=v${{ steps.version.outputs.version }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          PUSHED="${{ inputs.push && github.event_name != 'pull_request' }}"
          {
            echo "## Docker Build Summary"
            echo ""
            echo "**Image:** \`${IMAGE}\`"
            echo "**Version:** \`v${VERSION}\`"
            echo "**Platforms:** \`${{ inputs.platforms }}\`"
            echo "**Pushed:** \`${PUSHED}\`"
            if [ -n "${{ steps.build.outputs.digest }}" ]; then
              echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Second annotation with the resolved digest (empty on PRs
          # where push=false), lands next to the first under the run's
          # Annotations panel.
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            echo "::notice title=Built image::${IMAGE}:v${VERSION}@${{ steps.build.outputs.digest }}"
          fi
