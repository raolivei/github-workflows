name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name without registry prefix (e.g., my-app)"
        required: true
        type: string
      context:
        description: "Docker build context"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/arm64"
        type: string
      registry:
        description: "Container registry"
        required: false
        default: "ghcr.io"
        type: string
      push:
        description: "Push image after build"
        required: false
        default: true
        type: boolean
      build-args:
        description: "Docker build arguments (multiline KEY=value)"
        required: false
        default: ""
        type: string
      skip-if-already-built:
        description: |
          When true (default), hash the build context (via `git ls-tree`)
          and probe the registry for an image tagged `content-<hash>`.
          If that tag already exists, skip `docker build` entirely and
          just surface the existing digest. Keeps a failing frontend
          build from re-running a green api build on every retry.
        required: false
        default: true
        type: boolean
    secrets:
      REGISTRY_TOKEN:
        description: "Registry authentication token"
        required: true
    outputs:
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest }}
      version:
        description: "Version extracted from VERSION file"
        value: ${{ jobs.build.outputs.version }}
      content-hash:
        description: "Deterministic hash of the build context"
        value: ${{ jobs.build.outputs.content-hash }}
      skipped:
        description: "True when the build was skipped (content-hash already in registry)"
        value: ${{ jobs.build.outputs.skipped }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest || steps.probe.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
      content-hash: ${{ steps.content_hash.outputs.hash }}
      skipped: ${{ steps.probe.outputs.skipped }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # We only read the HEAD tree for the content hash, so a
          # shallow clone is enough and keeps checkout fast.
          fetch-depth: 1

      - name: Extract version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
            SOURCE="VERSION"
          elif [ -f "${{ inputs.context }}/VERSION" ]; then
            VERSION=$(cat "${{ inputs.context }}/VERSION" | tr -d '[:space:]')
            SOURCE="${{ inputs.context }}/VERSION"
          else
            VERSION="0.1.0"
            SOURCE="default"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: v$VERSION (from $SOURCE)"

      - name: Compute content hash
        id: content_hash
        # Hashes the git-tracked tree under the build context (filenames
        # + blob SHAs). Stable whenever the source hasn't changed, so we
        # can use it as an idempotent image tag and probe the registry
        # before burning another QEMU-emulated arm64 build.
        run: |
          CONTEXT="${{ inputs.context }}"
          DOCKERFILE="${{ inputs.dockerfile }}"
          # Include build-args in the hash — a rebuild with different
          # build-args legitimately produces a different image.
          BUILD_ARGS_HASH=$(printf '%s' "${{ inputs.build-args }}" | sha256sum | cut -d' ' -f1)
          TREE_HASH=$(git ls-tree -r HEAD -- "$CONTEXT" | sha256sum | cut -d' ' -f1)
          HASH=$(printf '%s|%s|%s|%s' "$TREE_HASH" "$DOCKERFILE" "$BUILD_ARGS_HASH" "${{ inputs.platforms }}" \
            | sha256sum | cut -d' ' -f1 | head -c 16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Content hash for ${CONTEXT} = content-${HASH}"

      - name: Announce build version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          HASH="${{ steps.content_hash.outputs.hash }}"
          # `::notice::` creates an entry in the workflow-run Annotations
          # panel so the version is discoverable without drilling into
          # step logs (matches how PR reviewers scan the run summary).
          echo "::notice title=Build version::${IMAGE}:v${VERSION} (content-${HASH})"

      - name: Log in to registry
        # Log in regardless of ``push`` so the probe step below can read
        # private GHCR tags. Auth is cheap; the gate on actually pushing
        # still lives on the build step.
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Probe registry for existing build
        id: probe
        # Sets ``skipped=true`` when an image tagged with this exact
        # content hash already exists in the registry. We use
        # ``docker buildx imagetools inspect`` because it talks straight
        # to the OCI API without starting a dockerd daemon.
        run: |
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          HASH="${{ steps.content_hash.outputs.hash }}"
          TAG="content-${HASH}"
          REF="${IMAGE}:${TAG}"
          if [ "${{ inputs.skip-if-already-built }}" != "true" ]; then
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "skip-if-already-built disabled via input; building."
            exit 0
          fi
          echo "Probing ${REF} ..."
          if OUT=$(docker buildx imagetools inspect "${REF}" 2>/dev/null); then
            # ``imagetools inspect`` prints a ``Digest:`` line for the
            # manifest it resolved — that's the real OCI digest, not a
            # local re-hash of the raw bytes.
            DIGEST=$(printf '%s\n' "$OUT" | awk '/^Digest:/ {print $2; exit}')
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
            echo "::notice title=Build skipped::${REF} already exists; reusing existing image (${DIGEST})"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "No existing image at ${REF}; proceeding with build."
          fi

      - name: Set up QEMU
        if: steps.probe.outputs.skipped != 'true'
        uses: docker/setup-qemu-action@v4

      - name: Extract metadata
        if: steps.probe.outputs.skipped != 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=semver,pattern=v{{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern=v{{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern=v{{major}},value=v${{ steps.version.outputs.version }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=content-${{ steps.content_hash.outputs.hash }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: steps.probe.outputs.skipped != 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          # Push to the registry whenever ``inputs.push`` is true, even
          # on pull_request runs — the content-hash tag is cheap and
          # lets the next retry skip if nothing changed.
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          HASH="${{ steps.content_hash.outputs.hash }}"
          SKIPPED="${{ steps.probe.outputs.skipped }}"
          DIGEST="${{ steps.build.outputs.digest || steps.probe.outputs.digest }}"
          {
            echo "## Docker Build Summary"
            echo ""
            echo "**Image:** \`${IMAGE}\`"
            echo "**Version:** \`v${VERSION}\`"
            echo "**Content hash:** \`content-${HASH}\`"
            echo "**Platforms:** \`${{ inputs.platforms }}\`"
            if [ "${SKIPPED}" = "true" ]; then
              echo "**Status:** ♻️  reused existing image (build skipped)"
            else
              echo "**Status:** 🛠 built"
            fi
            if [ -n "${DIGEST}" ]; then
              echo "**Digest:** \`${DIGEST}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${DIGEST}" ]; then
            echo "::notice title=Built image::${IMAGE}:v${VERSION}@${DIGEST}"
          fi
