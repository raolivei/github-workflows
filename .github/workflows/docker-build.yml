name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name without registry prefix (e.g., my-app)"
        required: true
        type: string
      context:
        description: "Docker build context"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/arm64"
        type: string
      registry:
        description: "Container registry"
        required: false
        default: "ghcr.io"
        type: string
      push:
        description: "Push image after build"
        required: false
        default: true
        type: boolean
      build-args:
        description: "Docker build arguments (multiline KEY=value)"
        required: false
        default: ""
        type: string
      create-git-tag:
        description: |
          When true, after a successful image push to the registry, create
          an annotated git tag ``v<VERSION>`` on the current commit if it
          does not already exist, and push it to ``origin``. Use only on
          default-branch ``push`` workflows (not PRs). Parallel jobs
          (e.g. api + frontend) may race; the second push is a no-op if
          the tag exists. Requires ``contents: write`` on the caller job.
        required: false
        default: false
        type: boolean
      job-timeout-minutes:
        description: |
          Max minutes for the build job (arm64 via QEMU can exceed the
          default 360 only when lowered by org policy; set 120 for heavy
          Poetry/ML images). Not valid on the caller job when using
          workflow_call — must be set here.
        required: false
        default: 90
        type: number
      runs-on:
        description: |
          Runner labels (JSON array or string). Use ["self-hosted", "Linux", "ARM64"]
          for Eldertree runners (default), or "ubuntu-latest" for GitHub-hosted.
        required: false
        default: "self-hosted"
        type: string
    secrets:
      REGISTRY_TOKEN:
        description: "Registry authentication token"
        required: true
    outputs:
      image:
        description: "Full image reference with tag"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest }}
      version:
        description: "Version extracted from VERSION file"
        value: ${{ jobs.build.outputs.version }}
      content-hash:
        description: "Deterministic hash of the build context"
        value: ${{ jobs.build.outputs.content-hash }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Default input is self-hosted (Eldertree ARC); callers can pass ubuntu-latest to opt out.
    runs-on: ${{ startsWith(inputs['runs-on'], '[') && fromJSON(inputs['runs-on']) || inputs['runs-on'] }}
    timeout-minutes: ${{ inputs.job-timeout-minutes }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
      content-hash: ${{ steps.content_hash.outputs.hash }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Shallow clone for the content hash; pull tags so the version
          # step can compute the next semver from existing release tags.
          fetch-depth: 1
          fetch-tags: true

      - name: Extract version
        id: version
        # Compute the version this build will publish, optionally
        # auto-bumping when ``inputs.create-git-tag == true`` on a
        # default-branch push. The rule:
        #
        #   1. Read the highest existing ``v<MAJOR>.<MINOR>.<PATCH>`` git
        #      tag in the repo as ``LATEST``. (Tags created by the
        #      ``git-version-tag`` job below; they are the source of truth
        #      for "what's already shipped".)
        #   2. Read the ``VERSION`` file as ``BASELINE`` (defaults to
        #      ``0.1.0``). This is the human-controlled floor — bump it
        #      to claim a new MAJOR or MINOR.
        #   3. If ``BASELINE > LATEST`` → use ``BASELINE``. The human
        #      explicitly bumped (e.g., 0.9.x → 0.10.0).
        #   4. Else → increment ``LATEST``'s PATCH. Routine merge, no
        #      human action needed.
        #
        # PR builds and non-default-branch pushes always use ``BASELINE``
        # verbatim — they don't publish releasable images.
        run: |
          set -euo pipefail
          BASELINE="0.1.0"
          if [ -f VERSION ]; then
            BASELINE=$(tr -d '[:space:]' < VERSION)
          elif [ -f "${{ inputs.context }}/VERSION" ]; then
            BASELINE=$(tr -d '[:space:]' < "${{ inputs.context }}/VERSION")
          fi

          AUTO_BUMP="false"
          if [ "${{ inputs.create-git-tag }}" = "true" ] \
            && [ "${{ github.event_name }}" = "push" ] \
            && [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            AUTO_BUMP="true"
          fi

          if [ "$AUTO_BUMP" = "true" ]; then
            LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1 | sed 's/^v//')
            LATEST=${LATEST:-0.0.0}
            # Pick the higher of (BASELINE, bumped LATEST). ``sort -V``
            # keeps semver ordering stable.
            BUMPED=$(awk -F. '{print $1"."$2"."$3+1}' <<< "$LATEST")
            VERSION=$(printf '%s\n%s\n' "$BASELINE" "$BUMPED" | sort -V | tail -n 1)
            echo "Auto-bump: BASELINE=$BASELINE, LATEST=v$LATEST → publishing v$VERSION"
          else
            VERSION="$BASELINE"
            echo "Using baseline VERSION: v$VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute content hash
        id: content_hash
        # Hashes the git-tracked tree under the build context (filenames
        # + blob SHAs). Stable whenever the source hasn't changed, so we
        # can use it as an idempotent image tag and probe the registry
        # before burning another QEMU-emulated arm64 build.
        run: |
          CONTEXT="${{ inputs.context }}"
          DOCKERFILE="${{ inputs.dockerfile }}"
          # Include build-args in the hash — a rebuild with different
          # build-args legitimately produces a different image.
          BUILD_ARGS_HASH=$(printf '%s' "${{ inputs.build-args }}" | sha256sum | cut -d' ' -f1)
          TREE_HASH=$(git ls-tree -r HEAD -- "$CONTEXT" | sha256sum | cut -d' ' -f1)
          HASH=$(printf '%s|%s|%s|%s' "$TREE_HASH" "$DOCKERFILE" "$BUILD_ARGS_HASH" "${{ inputs.platforms }}" \
            | sha256sum | cut -d' ' -f1 | head -c 16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Content hash for ${CONTEXT} = content-${HASH}"

      - name: Announce build version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          HASH="${{ steps.content_hash.outputs.hash }}"
          # `::notice::` creates an entry in the workflow-run Annotations
          # panel so the version is discoverable without drilling into
          # step logs (matches how PR reviewers scan the run summary).
          echo "::notice title=Build version::${IMAGE}:v${VERSION} (content-${HASH})"

      - name: Log in to registry
        # Log in regardless of ``push`` so the probe step below can read
        # private GHCR tags. Auth is cheap; the gate on actually pushing
        # still lives on the build step.
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=semver,pattern=v{{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern=v{{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern=v{{major}},value=v${{ steps.version.outputs.version }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=content-${{ steps.content_hash.outputs.hash }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          # ``cache-from: type=gha`` makes warm rebuilds fast (a no-op
          # build is ~30-60s on github-hosted runners; a couple minutes
          # on self-hosted Pi via QEMU). The previous content-hash probe
          # short-circuited the build to save those minutes, but it also
          # short-circuited tag emission — so a release commit on an
          # unchanged build context published no new semver tag and
          # FluxCD never reconciled. Letting every push run through the
          # build step is the simpler invariant.
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}"
          HASH="${{ steps.content_hash.outputs.hash }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          {
            echo "## Docker Build Summary"
            echo ""
            echo "**Image:** \`${IMAGE}\`"
            echo "**Version:** \`v${VERSION}\`"
            echo "**Content hash:** \`content-${HASH}\`"
            echo "**Platforms:** \`${{ inputs.platforms }}\`"
            if [ -n "${DIGEST}" ]; then
              echo "**Digest:** \`${DIGEST}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${DIGEST}" ]; then
            echo "::notice title=Built image::${IMAGE}:v${VERSION}@${DIGEST}"
          fi

  # Optional: mirror the container semver (from the repo ``VERSION`` file) as a
  # git tag so releases stay traceable next to GHCR tags. Safe when multiple
  # jobs run in parallel — only the first ``git push`` creates the tag.
  git-version-tag:
    name: Git tag (semver from VERSION file)
    needs: build
    if: >
      success() &&
      inputs.create-git-tag == true &&
      inputs.push == true &&
      github.event_name == 'push' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push annotated tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IMAGE_NAME: ${{ inputs.image-name }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::notice title=Git tag exists::${TAG} already on origin — skipping (idempotent)"
            exit 0
          fi
          git tag -a "${TAG}" -m "${IMAGE_NAME}: ${TAG} (CI image push)"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${TAG}"
          echo "::notice title=Git tag pushed::${TAG} → ${GITHUB_SHA}"
